name: Generate M3U Playlists (Node.js)

on:
  schedule:
    - cron: '0 3 * * *'  # Runs daily at 3:00 AM UTC
  workflow_dispatch:      # Manual trigger
  push:
    branches:
      - main
    paths:
      - 'index.js'                   # Your Node.js script
      - '.github/workflows/*.yml'    # Workflow files

jobs:
  build-playlists:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for proper git diff

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Create Playlists Directory
        run: mkdir -p playlists  # Ensure directory exists

      - name: Run Playlist Generation Script
        run: node index.js       # Your script should output to playlists/

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          if git diff --quiet --exit-code playlists/; then
            echo "No changes detected in playlists."
            exit 0
          fi
          
          echo "Changes detected, committing updates..."
          git add playlists/
          git commit -m "Update playlists [skip ci]"
          
          n=0
          until [ $n -ge 3 ]
          do
             git push && break
             n=$((n+1))
             echo "Push failed. Retry $n/3..."
             sleep 5
          done
          [ $n -ge 3 ] && echo "Push failed after 3 attempts" && exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
