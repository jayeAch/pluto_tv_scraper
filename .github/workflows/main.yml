name: Run and Commit Script (Every 12 Hours)
on:
  schedule:
    - cron: '0 */12 * * *'  # Runs every 12 hours
  workflow_dispatch:  # Optional: Manual trigger

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Ensures Git history for proper commits

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run script (generates files)
        run: node index.js  # Your script should output files (e.g., `output.json`)

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if files changed (replace `output.json` with your file(s))
          if git diff --quiet --exit-code output.json; then
            echo "No changes detected."
            exit 0
          fi

          echo "Changes detected. Committing..."
          git add output.json  # Stage the modified file(s)
          git commit -m "Auto-update: Script output [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Automatic auth token
