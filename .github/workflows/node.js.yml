steps:
  - uses: actions/checkout@v4
  - uses: actions/setup-node@v4
    with:
      node-version: 'lts/*'
  - run: npm install
  - run: node index  # Generates m3u8/xmltv files

  # NEW: Upload the generated files
  - uses: actions/upload-artifact@v4
    with:
      name: pluto-tv-data
      path: |
        *.m3u8
        *.xmltv
      retention-days: 1  # Keep for 1 day (adjust as needed)
