name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
      
      - run: npm install
      - run: node index  # Generates *.m3u8 and *.xmltv files
      
      # Configure Git (required for pushing)
      - name: Setup Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
      
      # Commit and push the generated files
      - name: Upload to Repo
        run: |
          git add *.m3u8 *.xml
          git commit -m "Auto-update Pluto TV data"
          git push
